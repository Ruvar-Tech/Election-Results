    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 Election Results</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>2025 Election Results</h1>
        <div class="chart-container">
            <canvas id="electionChart"></canvas>
        </div>
        <div class="legend">
            <div class="legend-item">
                <span class="color-box dad"></span>
                <span class="party-name">DAD - 45%</span>
            </div>
            <div class="legend-item">
                <span class="color-box ppp"></span>
                <span class="party-name">PPP - 5%</span>
            </div>
            <div class="legend-item">
                <span class="color-box cccc"></span>
                <span class="party-name">CCCC - 27%</span>
            </div>
            <div class="legend-item">
                <span class="color-box mcd"></span>
                <span class="party-name">MCD - 23%</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
